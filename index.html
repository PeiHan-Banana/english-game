<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学英语单词闯关游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .rainbow-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .rainbow-svg {
            width: 150px;
            height: 100px;
        }

        .rainbow-title {
            font-size: 36px;
            color: #667eea;
            margin-top: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .credit {
            color: #764ba2;
            font-size: 18px;
            margin-top: 5px;
            font-weight: bold;
        }

        .menu-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .game-title {
            font-size: 42px;
            color: #764ba2;
            margin-bottom: 40px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
        }

        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .mode-btn {
            padding: 25px 50px;
            font-size: 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .mode-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .btn-listen {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-read {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
        }

        .btn-write {
            background: linear-gradient(45deg, #43e97b, #38f9d7);
            color: white;
        }

        .game-screen {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-radius: 15px;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .timer {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #f5576c;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .timer.warning {
            color: #ff6b6b;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .question-area {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 36px;
            color: #764ba2;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .play-audio-btn {
            padding: 20px 40px;
            font-size: 24px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }

        .play-audio-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }

        .play-audio-btn:active {
            transform: scale(0.95);
        }

        .options-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .option-btn {
            padding: 30px 20px;
            font-size: 24px;
            border: 3px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            color: #333;
        }

        .option-btn:hover {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea10, #764ba210);
            transform: translateY(-3px);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: white;
            border-color: #38f9d7;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #f5576c, #f093fb);
            color: white;
            border-color: #f5576c;
        }

        .input-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .word-input {
            padding: 20px 30px;
            font-size: 28px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            text-align: center;
        }

        .word-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            margin-top: 15px;
            padding: 15px 50px;
            font-size: 22px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }

        .feedback {
            text-align: center;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.correct {
            background: linear-gradient(135deg, #43e97b20, #38f9d720);
            color: #38f9d7;
        }

        .feedback.wrong {
            background: linear-gradient(135deg, #f5576c20, #f093fb20);
            color: #f5576c;
        }

        .bottom-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .bottom-btn {
            padding: 20px 40px;
            font-size: 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .bottom-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-next {
            background: linear-gradient(45deg, #43e97b, #38f9d7);
            color: white;
        }

        .btn-menu {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
        }

        .score-display {
            text-align: center;
            font-size: 28px;
            color: #764ba2;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .result-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .history-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .history-title {
            font-size: 36px;
            color: #764ba2;
            margin-bottom: 30px;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 30px;
        }

        .history-item {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item-info {
            text-align: left;
        }

        .history-item-mode {
            font-size: 20px;
            color: #764ba2;
            font-weight: bold;
        }

        .history-item-date {
            font-size: 16px;
            color: #888;
        }

        .history-item-score {
            font-size: 28px;
            color: #f5576c;
            font-weight: bold;
        }

        .no-history {
            font-size: 24px;
            color: #888;
            padding: 40px;
        }

        .btn-history {
            background: linear-gradient(45deg, #a8edea, #fed6e3);
            color: #764ba2;
        }

        .result-title {
            font-size: 48px;
            color: #764ba2;
            margin-bottom: 30px;
        }

        .result-score {
            font-size: 72px;
            color: #f5576c;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .result-message {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 40px;
        }

        .stars {
            font-size: 60px;
            margin-bottom: 30px;
        }

        .star {
            display: inline-block;
            margin: 0 10px;
            animation: starPop 0.5s ease-out;
        }

        @keyframes starPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            .options-area {
                grid-template-columns: 1fr;
            }

            .question-text {
                font-size: 28px;
            }

            .option-btn {
                font-size: 20px;
            }

            .game-title {
                font-size: 32px;
            }

            .mode-btn {
                padding: 20px 30px;
                font-size: 20px;
            }
        }

        .login-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .name-input {
            padding: 20px 30px;
            font-size: 28px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            width: 80%;
            max-width: 350px;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            text-align: center;
            display: block;
            margin: 0 auto 20px;
        }

        .name-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .player-info {
            text-align: center;
            margin-bottom: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-name-display {
            font-size: 22px;
            color: #764ba2;
            font-weight: bold;
        }

        .switch-player-btn {
            padding: 8px 20px;
            font-size: 14px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            font-weight: bold;
        }

        .btn-resume {
            background: linear-gradient(45deg, #ffd86f, #fc6262);
            color: white;
        }

        .sync-status {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }

        .sync-status.online {
            color: #43e97b;
        }

        .sync-status.offline {
            color: #f5576c;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="rainbow-header">
            <svg class="rainbow-svg" viewBox="0 0 200 120">
                <defs>
                    <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#ff6b6b"/>
                        <stop offset="20%" style="stop-color:#feca57"/>
                        <stop offset="40%" style="stop-color:#48dbfb"/>
                        <stop offset="60%" style="stop-color:#ff9ff3"/>
                        <stop offset="80%" style="stop-color:#54a0ff"/>
                        <stop offset="100%" style="stop-color:#5f27cd"/>
                    </linearGradient>
                </defs>
                <path d="M 20 100 Q 100 -20 180 100" fill="none" stroke="url(#rainbowGradient)" stroke-width="20" stroke-linecap="round"/>
                <circle cx="180" cy="100" r="15" fill="#feca57"/>
            </svg>
            <h1 class="rainbow-title">小学英语单词闯关游戏</h1>
            <p class="credit">By Rainbow</p>
        </div>


        <div class="login-screen" id="loginScreen">
            <h2 class="game-title"> 欢迎来到英语闯关！</h2>
            <p style="font-size: 20px; color: #764ba2; margin-bottom: 25px;">请输入你的名字</p>
            <input type="text" class="name-input" id="playerNameInput" placeholder="你的名字" maxlength="10">
            <button class="mode-btn btn-listen" onclick="loginPlayer()" style="margin-top: 10px;">
                 开始游戏
            </button>
        </div>

        <div class="menu-screen" id="menuScreen" style="display: none;">

            <div class="player-info" id="playerInfo" style="display: none;">
                <span class="player-name-display" id="playerNameDisplay"> 玩家</span>
                <button class="switch-player-btn" onclick="switchPlayer()">切换玩家</button>
            </div>
            <h2 class="game-title">🎮 选择游戏模式 🎮</h2>
            <div class="mode-buttons">
                <button class="mode-btn btn-listen" onclick="startGame('listen')">
                    🔊 听音选单词
                </button>
                <button class="mode-btn btn-read" onclick="startGame('read')">
                    📖 看单词选中文
                </button>
                <button class="mode-btn btn-write" onclick="startGame('write')">
                    ✏️ 听音写单词
                </button>
                <button class="mode-btn btn-history" onclick="showHistory()">
                    📊 查看历史得分
                </button>
                <button class="mode-btn btn-resume" id="resumeBtn" onclick="resumeGame()" style="display: none;">
                     继续上次游戏
                </button>
            </div>
            <div class="sync-status" id="syncStatus"> 本地存储模式</div>
        </div>

        <div class="game-screen" id="gameScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">1 / 15</div>
            </div>

            <div class="timer" id="timer">15</div>

            <div class="score-display">
                得分：<span id="scoreDisplay">0</span>
            </div>

            <div class="question-area" id="questionArea">
                <div class="question-text" id="questionText">题目显示区域</div>
                <button class="play-audio-btn" id="playAudioBtn" onclick="playAudio()" style="display: none;">
                    🔊 播放发音
                </button>
            </div>

            <div class="options-area" id="optionsArea">
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" class="word-input" id="wordInput" placeholder="输入单词" autocomplete="off">
                <button class="submit-btn" id="submitBtn" onclick="submitAnswer()" style="display: none;">
                    提交
                </button>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="bottom-buttons">
                <button class="bottom-btn btn-next" id="nextBtn" onclick="nextQuestion()" style="display: none;">
                    ➡️ 继续下一题
                </button>
                <button class="bottom-btn btn-menu" onclick="showMenu()">
                    🏠 返回主菜单
                </button>
            </div>
        </div>

        <div class="result-screen" id="resultScreen">
            <h2 class="result-title">🎉 恭喜完成！🎉</h2>
            <div class="result-score" id="finalScore">0</div>
            <div class="stars" id="stars"></div>
            <div class="result-message" id="resultMessage"></div>
            <div class="mode-buttons">
                <button class="mode-btn btn-next" onclick="restartGame()">
                    🔄 再玩一次
                </button>
                <button class="mode-btn btn-menu" onclick="showMenu()">
                    🏠 返回主菜单
                </button>
            </div>
        </div>

        <div class="history-screen" id="historyScreen">
            <h2 class="history-title">📊 历史得分记录</h2>
            <div class="history-list" id="historyList"></div>
            <div class="mode-buttons">
                <button class="mode-btn btn-menu" onclick="showMenu()">
                    🏠 返回主菜单
                </button>
            </div>
        </div>
    </div>


    <!-- Firebase SDK -->

        // 初始化 Firebase
        function initFirebase() {
            try {
                if (firebaseConfig.apiKey && firebaseConfig.databaseURL) {
                    const app = firebase.initializeApp(firebaseConfig);
                    firebaseDB = firebase.database();
                    isFirebaseReady = true;
                    updateSyncStatus(true);
                    console.log('Firebase 已连接');
                } else {
                    console.log('Firebase 未配置，使用本地存储');
                    updateSyncStatus(false);
                }
            } catch (e) {
                console.log('Firebase 初始化失败，使用本地存储:', e);
                updateSyncStatus(false);
            }
        }

        function updateSyncStatus(online) {
            const el = document.getElementById('syncStatus');
            if (el) {
                if (online) {
                    el.textContent = ' 云端同步已开启';
                    el.className = 'sync-status online';
                } else {
                    el.textContent = ' 本地存储模式';
                    el.className = 'sync-status offline';
                }
            }
        }

        // ========== 玩家登录 ==========
        function loginPlayer() {
            const nameInput = document.getElementById('playerNameInput');
            const name = nameInput.value.trim();
            if (!name) {
                nameInput.style.borderColor = '#f5576c';
                nameInput.placeholder = '请输入名字！';
                return;
            }
            currentPlayerName = name;
            localStorage.setItem('englishGameLastPlayer', name);

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('menuScreen').style.display = 'block';
            document.getElementById('playerInfo').style.display = 'flex';
            document.getElementById('playerNameDisplay').textContent = ' ' + name;

            // 加载该玩家的数据
            loadPlayerData(name);
        }

        function switchPlayer() {
            clearInterval(timerInterval);
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('resumeBtn').style.display = 'none';
            currentPlayerName = '';
        }

        // ========== 数据存储 ==========
        function getStorageKey(type) {
            return 'englishGame_' + currentPlayerName + '_' + type;
        }

        // 保存游戏进度（断点续玩）
        function saveGameProgress() {
            if (!currentPlayerName || currentQuestionIndex >= 15) return;
            const progressData = {
                mode: currentMode,
                questionIndex: currentQuestionIndex,
                score: score,
                questions: gameQuestions,
                timestamp: Date.now()
            };

            // 保存到 localStorage
            localStorage.setItem(getStorageKey('progress'), JSON.stringify(progressData));

            // 保存到 Firebase
            if (isFirebaseReady && firebaseDB) {
                firebaseDB.ref('players/' + currentPlayerName + '/progress').set(progressData)
                    .catch(err => console.log('Firebase保存进度失败:', err));
            }
        }

        // 加载玩家数据
        function loadPlayerData(playerName) {
            // 先从 localStorage 加载
            const localProgress = localStorage.getItem(getStorageKey('progress'));
            if (localProgress) {
                const data = JSON.parse(localProgress);
                // 检查进度是否有效（24小时内）
                if (Date.now() - data.timestamp < 24 * 60 * 60 * 1000) {
                    document.getElementById('resumeBtn').style.display = 'block';
                }
            }

            // 如果 Firebase 可用，从云端加载
            if (isFirebaseReady && firebaseDB) {
                firebaseDB.ref('players/' + playerName).once('value')
                    .then(snapshot => {
                        const data = snapshot.val();
                        if (data) {
                            // 同步历史记录
                            if (data.history) {
                                const localHistory = JSON.parse(localStorage.getItem(getStorageKey('history')) || '[]');
                                // 合并云端和本地记录（去重）
                                const merged = mergeHistory(localHistory, data.history);
                                localStorage.setItem(getStorageKey('history'), JSON.stringify(merged));
                            }
                            // 同步游戏进度
                            if (data.progress && Date.now() - data.progress.timestamp < 24 * 60 * 60 * 1000) {
                                localStorage.setItem(getStorageKey('progress'), JSON.stringify(data.progress));
                                document.getElementById('resumeBtn').style.display = 'block';
                            }
                        }
                    })
                    .catch(err => console.log('Firebase加载失败:', err));
            }
        }

        function mergeHistory(local, cloud) {
            const all = [...local];
            cloud.forEach(item => {
                const exists = all.some(a => a.date === item.date && a.score === item.score && a.mode === item.mode);
                if (!exists) all.push(item);
            });
            all.sort((a, b) => new Date(b.date) - new Date(a.date));
            return all.slice(0, 30);
        }

        // 继续上次游戏
        function resumeGame() {
            const savedProgress = localStorage.getItem(getStorageKey('progress'));
            if (!savedProgress) return;

            const data = JSON.parse(savedProgress);
            currentMode = data.mode;
            currentQuestionIndex = data.questionIndex;
            score = data.score;
            gameQuestions = data.questions;

            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'none';

            displayQuestion();
        }

        }

        // Web Audio API 创建音效 - 移动端兼容版
        let audioContext = null;

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        document.addEventListener('click', initAudioContext);
        document.addEventListener('touchstart', initAudioContext);

        function playSuccessSound() {
            initAudioContext();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1);
            oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.4);
        }

        function playWrongSound() {
            initAudioContext();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(261.63, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(220.00, audioContext.currentTime + 0.15);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.3);
        }

        // 语音合成 - 移动端兼容版
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const trySpeak = () => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.8;
                    const voices = window.speechSynthesis.getVoices();
                    const englishVoice = voices.find(v => v.lang.startsWith('en'));
                    if (englishVoice) utterance.voice = englishVoice;
                    window.speechSynthesis.speak(utterance);
                };
                if (window.speechSynthesis.getVoices().length === 0) {
                    window.speechSynthesis.addEventListener('voiceschanged', trySpeak, { once: true });
                    setTimeout(trySpeak, 100);
                } else {
                    trySpeak();
                }
                return;
            }
            const audio = new Audio('https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2');
            audio.play().catch(err => console.log('备选音频失败:', err));
        }

        function getAllVocabulary() {
            let allWords = [];
            Object.values(vocabularyDatabase).forEach(grade => {
                Object.values(grade).forEach(semester => {
                    allWords = allWords.concat(semester);
                });
            });
            return allWords;
        }

        // 随机抽取题目
        function getRandomQuestions(count) {
            const allWords = getAllVocabulary();
            const shuffled = [...allWords].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count);
        }

        // 随机生成干扰项
        function getWrongOptions(correctWord, count) {
            const allWords = getAllVocabulary();
            const wrongOptions = allWords
                .filter(word => word.word !== correctWord.word && word.chinese !== correctWord.chinese)
                .sort(() => Math.random() - 0.5)
                .slice(0, count);
            return wrongOptions;
        }

        // 开始游戏
        function startGame(mode) {
            currentMode = mode;
            currentQuestionIndex = 0;
            score = 0;
            gameQuestions = getRandomQuestions(15);
            
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'none';
            
            clearSavedProgress();
            displayQuestion();
        }

        // 显示题目
        function displayQuestion() {
            isAnswered = false;
            const question = gameQuestions[currentQuestionIndex];
            
            // 重置界面
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('wordInput').value = '';
            
            // 更新进度
            document.getElementById('progressFill').textContent = `${currentQuestionIndex + 1} / 15`;
            document.getElementById('progressFill').style.width = `${((currentQuestionIndex + 1) / 15) * 100}%`;
            
            // 更新分数
            document.getElementById('scoreDisplay').textContent = score;
            
            // 重置计时器
            resetTimer();
            
            const questionText = document.getElementById('questionText');
            const playAudioBtn = document.getElementById('playAudioBtn');
            const optionsArea = document.getElementById('optionsArea');
            const inputArea = document.getElementById('inputArea');
            
            optionsArea.innerHTML = '';
            inputArea.style.display = 'none';
            playAudioBtn.style.display = 'none';
            
            if (currentMode === 'listen') {
                // 听音选单词模式
                questionText.textContent = '点击按钮听发音，选择正确的中文意思';
                playAudioBtn.style.display = 'block';
                document.getElementById('submitBtn').style.display = 'none';
                
                const correctAnswer = question;
                const wrongOptions = getWrongOptions(question, 3);
                const allOptions = [...wrongOptions, correctAnswer].sort(() => Math.random() - 0.5);
                
                allOptions.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = option.chinese;
                    btn.onclick = () => checkAnswer(option.chinese, correctAnswer.chinese, btn);
                    optionsArea.appendChild(btn);
                });
                
                setTimeout(() => playAudio(), 500);
                
            } else if (currentMode === 'read') {
                // 看单词选中文模式
                questionText.textContent = question.word;
                
                const correctAnswer = question;
                const wrongOptions = getWrongOptions(question, 3);
                const allOptions = [...wrongOptions, correctAnswer].sort(() => Math.random() - 0.5);
                
                allOptions.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = option.chinese;
                    btn.onclick = () => checkAnswer(option.chinese, correctAnswer.chinese, btn);
                    optionsArea.appendChild(btn);
                });
                
                document.getElementById('submitBtn').style.display = 'none';
                
            } else if (currentMode === 'write') {
                // 听音写单词模式
                questionText.textContent = '点击按钮听发音，输入正确的单词';
                playAudioBtn.style.display = 'block';
                inputArea.style.display = 'block';
                document.getElementById('submitBtn').style.display = 'inline-block';
                document.getElementById('wordInput').focus();
                
                // 绑定回车键
                document.getElementById('wordInput').onkeypress = function(e) {
                    if (e.key === 'Enter' && !isAnswered) {
                        submitAnswer();
                    }
                };
                
                setTimeout(() => playAudio(), 500);
            }
        }

        // 播放发音
        function playAudio() {
            const question = gameQuestions[currentQuestionIndex];
            speak(question.word);
        }

        // 提交答案（听音写单词模式）
        function submitAnswer() {
            if (isAnswered) return;
            const userAnswer = document.getElementById('wordInput').value.trim().toLowerCase();
            const question = gameQuestions[currentQuestionIndex];
            checkAnswer(userAnswer, question.word.toLowerCase(), null);
        }

        // 检查答案
        function checkAnswer(userAnswer, correctAnswer, button) {
            if (isAnswered) return;
            isAnswered = true;
            
            clearInterval(timerInterval);
            
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';
            
            const isCorrect = userAnswer === correctAnswer;
            
            if (isCorrect) {
                score += 10;
                feedback.textContent = praiseWords[Math.floor(Math.random() * praiseWords.length)];
                feedback.classList.add('correct');
                playSuccessSound();
                
                if (button) {
                    button.classList.add('correct');
                }
            } else {
                feedback.textContent = wrongWords[Math.floor(Math.random() * wrongWords.length)];
                feedback.classList.add('wrong');
                playWrongSound();
                
                if (button) {
                    button.classList.add('wrong');
                    // 显示正确答案
                    const allOptions = document.querySelectorAll('.option-btn');
                    allOptions.forEach(btn => {
                        if (btn.textContent === correctAnswer) {
                            btn.classList.add('correct');
                        }
                    });
                }
            }
            
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('nextBtn').style.display = 'block';
            
            // 听音写单词模式下显示正确答案
            if (currentMode === 'write' && !isCorrect) {
                feedback.textContent = `哎呀，错啦！正确答案是: ${correctAnswer}`;
            }
        }

        // 下一题
        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex >= 15) {
                showResult();
            } else {
                displayQuestion();
                saveGameProgress();
            }
        }

        // 显示结果
        function showResult() {
            // 保存得分到历史记录
            saveScore(currentMode, score);
            
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            
            document.getElementById('finalScore').textContent = `${score} 分`;
            
            // 显示星星
            const starsContainer = document.getElementById('stars');
            starsContainer.innerHTML = '';
            const starCount = Math.ceil(score / 50);
            for (let i = 0; i < starCount && i < 5; i++) {
                const star = document.createElement('span');
                star.className = 'star';
                star.textContent = '⭐';
                star.style.animationDelay = `${i * 0.2}s`;
                starsContainer.appendChild(star);
            }
            
            // 显示评价
            const resultMessage = document.getElementById('resultMessage');
            if (score >= 140) {
                resultMessage.textContent = '太棒了！你是英语小天才！🎉';
            } else if (score >= 100) {
                resultMessage.textContent = '很不错！继续加油！💪';
            } else if (score >= 60) {
                resultMessage.textContent = '还可以哦，多练习会更好！😊';
            } else {
                resultMessage.textContent = '别灰心，再接再厉！💪';
            }
        }

        // 重新开始
        function restartGame() {
            startGame(currentMode);
        }

        // 返回主菜单
        function showMenu() {
            clearInterval(timerInterval);
            document.getElementById('menuScreen').style.display = 'block';
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'none';
        }

        // 计时器
        function resetTimer() {
            clearInterval(timerInterval);
            timer = 15;
            document.getElementById('timer').textContent = timer;
            document.getElementById('timer').classList.remove('warning');
            
            timerInterval = setInterval(() => {
                timer--;
                document.getElementById('timer').textContent = timer;
                
                if (timer <= 5) {
                    document.getElementById('timer').classList.add('warning');
                }
                
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    if (!isAnswered) {
                        isAnswered = true;
                        const feedback = document.getElementById('feedback');
                        feedback.style.display = 'block';
                        feedback.textContent = '时间到！';
                        feedback.classList.add('wrong');
                        playWrongSound();
                        
                        if (currentMode === 'write') {
                            const question = gameQuestions[currentQuestionIndex];
                            feedback.textContent = `时间到！正确答案是: ${question.word}`;
                        }
                        
                        document.getElementById('nextBtn').style.display = 'block';
                        
                        // 显示正确答案
                        if (currentMode !== 'write') {
                            const allOptions = document.querySelectorAll('.option-btn');
                            allOptions.forEach(btn => {
                                if (currentMode === 'listen') {
                                    const correctAnswer = gameQuestions[currentQuestionIndex].chinese;
                                    if (btn.textContent === correctAnswer) {
                                        btn.classList.add('correct');
                                    }
                                } else if (currentMode === 'read') {
                                    const correctAnswer = gameQuestions[currentQuestionIndex].chinese;
                                    if (btn.textContent === correctAnswer) {
                                        btn.classList.add('correct');
                                    }
                                }
                            });
                        }
                    }
                }
            }, 1000);
        }

        // 页面加载时恢复音频上下文
        document.addEventListener('click', function() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, { once: true });

        // 历史记录管理
        function saveScore(mode, score) {
            const history = JSON.parse(localStorage.getItem(getStorageKey('history')) || '[]');
            const record = {
                mode: mode,
                score: score,
                date: new Date().toLocaleString('zh-CN'),
                player: currentPlayerName
            };
            history.unshift(record);
            if (history.length > 30) {
                history.pop();
            }
            localStorage.setItem(getStorageKey('history'), JSON.stringify(history));

            // 同步到 Firebase
            if (isFirebaseReady && firebaseDB) {
                firebaseDB.ref('players/' + currentPlayerName + '/history').set(history)
                    .catch(err => console.log('Firebase保存历史失败:', err));
            }

            // 清除游戏进度
            clearSavedProgress();
        }

        function showHistory() {
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'block';

            const history = JSON.parse(localStorage.getItem(getStorageKey('history')) || '[]');
            const historyList = document.getElementById('historyList');

            if (history.length === 0) {
                historyList.innerHTML = '<div class="no-history">暂无游戏记录，快去玩游戏吧！</div>';
                return;
            }

            const modeNames = {
                'listen': '听音选单词',
                'read': '看单词选中文',
                'write': '听音写单词'
            };

            historyList.innerHTML = history.map((record, index) => {
                return '<div class="history-item">' +
                    '<div class="history-item-info">' +
                    '<div class="history-item-mode">' + (modeNames[record.mode] || record.mode) + '</div>' +
                    '<div class="history-item-date">' + record.date + '</div>' +
                    '</div>' +
                    '<div class="history-item-score">' + record.score + ' 分</div>' +
                    '</div>';
            }).join('');
        }

        function clearHistory() {
            localStorage.removeItem('englishGameHistory');
            showHistory();
        }
    </script>
</body>
</html>
