<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学英语单词闯关游戏</title>
        <link rel="stylesheet" href="styles.css">

</head>
<body>
    <div class="container">
        <div class="rainbow-header">
            <svg class="rainbow-svg" viewBox="0 0 200 120">
                <defs>
                    <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#ff6b6b"/>
                        <stop offset="20%" style="stop-color:#feca57"/>
                        <stop offset="40%" style="stop-color:#48dbfb"/>
                        <stop offset="60%" style="stop-color:#ff9ff3"/>
                        <stop offset="80%" style="stop-color:#54a0ff"/>
                        <stop offset="100%" style="stop-color:#5f27cd"/>
                    </linearGradient>
                </defs>
                <path d="M 20 100 Q 100 -20 180 100" fill="none" stroke="url(#rainbowGradient)" stroke-width="20" stroke-linecap="round"/>
                <circle cx="180" cy="100" r="15" fill="#feca57"/>
            </svg>
            <h1 class="rainbow-title">小学英语单词闯关游戏</h1>
            <p class="credit">By Rainbow</p>
        </div>


        <div class="login-screen" id="loginScreen">
            <h2 class="game-title">👋 欢迎来到英语闯关！</h2>
            <p style="font-size: 20px; color: #764ba2; margin-bottom: 25px;">请输入你的名字</p>
            <input type="text" class="name-input" id="playerNameInput" placeholder="你的名字" maxlength="10">
            <button class="mode-btn btn-listen" onclick="loginPlayer()" style="margin-top: 10px;">
                🚀 开始游戏
            </button>
        </div>

        <div class="menu-screen" id="menuScreen" style="display: none;">

            <div class="player-info" id="playerInfo" style="display: none;">
                <span class="player-name-display" id="playerNameDisplay"> 玩家</span>
                <button class="switch-player-btn" onclick="switchPlayer()">切换玩家</button>
            </div>
            <h2 class="game-title">🎮 选择游戏模式 🎮</h2>

            <div class="grade-selection" id="gradeSelection">
                <h3>📚 选择学习范围</h3>
                <div class="grade-select-all"><label><input type="checkbox" id="selectAllGrades" checked onchange="toggleAllGrades(this.checked)"> 全选/取消</label></div>
                <div class="grade-grid">
                    <label class="grade-checkbox selected" id="cb_g3s1"><input type="checkbox" checked onchange="updateGradeSelection()"> 三年级上</label>
                    <label class="grade-checkbox selected" id="cb_g3s2"><input type="checkbox" checked onchange="updateGradeSelection()"> 三年级下</label>
                    <label class="grade-checkbox selected" id="cb_g4s1"><input type="checkbox" checked onchange="updateGradeSelection()"> 四年级上</label>
                    <label class="grade-checkbox selected" id="cb_g4s2"><input type="checkbox" checked onchange="updateGradeSelection()"> 四年级下</label>
                    <label class="grade-checkbox selected" id="cb_g5s1"><input type="checkbox" checked onchange="updateGradeSelection()"> 五年级上</label>
                    <label class="grade-checkbox selected" id="cb_g5s2"><input type="checkbox" checked onchange="updateGradeSelection()"> 五年级下</label>
                    <label class="grade-checkbox selected" id="cb_g6s1"><input type="checkbox" checked onchange="updateGradeSelection()"> 六年级上</label>
                    <label class="grade-checkbox selected" id="cb_g6s2"><input type="checkbox" checked onchange="updateGradeSelection()"> 六年级下</label>
                </div>
            </div>
            <div class="checkin-area" id="checkinArea"><span>🔥</span><span class="checkin-streak">连续打卡 <span class="streak-num" id="streakNum">0</span> 天</span><span>🔥</span></div>
            <div class="question-count-area">
                <h3>📝 每轮题目数量</h3>
                <div class="count-options">
                    <button class="count-btn" onclick="setQuestionCount(5)">5题</button>
                    <button class="count-btn" onclick="setQuestionCount(10)">10题</button>
                    <button class="count-btn selected" onclick="setQuestionCount(15)">15题</button>
                    <button class="count-btn" onclick="setQuestionCount(20)">20题</button>
                </div>
            </div>
            <div class="mode-buttons">
                <button class="mode-btn btn-listen" onclick="startGame('listen')">
                     听音选单词
                </button>
                <button class="mode-btn btn-read" onclick="startGame('read')">
                     看单词选中文
                </button>
                <button class="mode-btn btn-write" onclick="startGame('write')">
                     听音写单词
                </button>
                <button class="mode-btn btn-reverse" onclick="startGame('reverse')">
                     看中文选英文
                </button>
                <button class="mode-btn btn-wrong-words" onclick="showWrongNotebook()" id="wrongWordsBtn" style="display:none">
                     错词本 (<span id="wrongWordsCount">0</span>)
                </button>
                <button class="mode-btn btn-history" onclick="showHistory()">
                     查看历史得分
                </button>
                <button class="mode-btn btn-leaderboard" onclick="showLeaderboard()">
                     排行榜
                </button>
                <button class="mode-btn btn-resume" id="resumeBtn" onclick="resumeGame()" style="display: none;">
                     继续上次游戏
                </button>
            </div>
            <div class="sync-status" id="syncStatus">本地存储模式</div>
        </div>

        <div class="game-screen" id="gameScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">1 / 15</div>
            </div>

            <div class="timer" id="timer">15</div>

            <div class="score-display">
                得分：<span id="scoreDisplay">0</span>
            </div>

            <div class="question-area" id="questionArea">
                <div class="question-text" id="questionText">题目显示区域</div>
                <button class="play-audio-btn" id="playAudioBtn" onclick="playAudio()" style="display: none;">
                    🔊 播放发音
                </button>
            </div>

            <div class="options-area" id="optionsArea">
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" class="word-input" id="wordInput" placeholder="输入单词" autocomplete="off">
                <button class="submit-btn" id="submitBtn" onclick="submitAnswer()" style="display: none;">
                    提交
                </button>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="bottom-buttons">
                <button class="bottom-btn btn-next" id="nextBtn" onclick="nextQuestion()" style="display: none;">
                    ➡️ 继续下一题
                </button>
                <button class="bottom-btn btn-menu" onclick="showMenu()">
                    🏠 返回主菜单
                </button>
            </div>
        </div>

        <div class="result-screen" id="resultScreen">
            <h2 class="result-title">🎉 恭喜完成！🎉</h2>
            <div class="result-score" id="finalScore">0</div>
            <div class="stars" id="stars"></div>
            <div class="result-message" id="resultMessage"></div>
            <div class="mode-buttons">
                <button class="mode-btn btn-next" onclick="restartGame()">
                    🔄 再玩一次
                </button>
                <button class="mode-btn btn-menu" onclick="showMenu()">
                    🏠 返回主菜单
                </button>
            </div>
        </div>

        <div class="history-screen" id="historyScreen">
            <h2 class="history-title">📊 历史得分记录</h2>
            <div class="history-list" id="historyList"></div>
            <div class="mode-buttons">
                <button class="mode-btn btn-menu" onclick="showMenu()">
                    🏠 返回主菜单
                </button>
            </div>
        </div>

        <div class="wrong-notebook-screen" id="wrongNotebookScreen">
            <h2 class="history-title">📕 我的错词本</h2>
            <div id="wrongWordsList" class="history-list"></div>
            <div class="mode-buttons">
                <button class="mode-btn btn-wrong-words" id="practiceWrongBtn" onclick="startWrongWordsGame()" style="display:none">🔄 练习这些错词</button>
                <button class="mode-btn btn-menu" onclick="clearWrongWords()">🗑️ 清空错词本</button>
                <button class="mode-btn btn-menu" onclick="showMenu()">🏠 返回主菜单</button>
            </div>
        </div>
        <div class="leaderboard-screen" id="leaderboardScreen">
            <h2 class="history-title">🏆 排行榜</h2>
            <div id="leaderboardList" class="history-list"></div>
            <div class="mode-buttons">
                <button class="mode-btn btn-menu" onclick="showMenu()">🏠 返回主菜单</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
    <script src="game.js"></script>
</body>
</html>
