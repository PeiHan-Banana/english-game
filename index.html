<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学英语单词闯关游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .rainbow-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .rainbow-svg {
            width: 150px;
            height: 100px;
        }

        .rainbow-title {
            font-size: 36px;
            color: #667eea;
            margin-top: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .credit {
            color: #764ba2;
            font-size: 18px;
            margin-top: 5px;
            font-weight: bold;
        }

        .menu-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .game-title {
            font-size: 42px;
            color: #764ba2;
            margin-bottom: 40px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
        }

        .mode-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 40px;
        }

        .mode-btn {
            padding: 25px 50px;
            font-size: 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .mode-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .btn-listen {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
        }

        .btn-read {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
        }

        .btn-write {
            background: linear-gradient(45deg, #43e97b, #38f9d7);
            color: white;
        }

        .game-screen {
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f093fb, #f5576c);
            border-radius: 15px;
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .timer {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #f5576c;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .timer.warning {
            color: #ff6b6b;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .question-area {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-radius: 20px;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 36px;
            color: #764ba2;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .play-audio-btn {
            padding: 20px 40px;
            font-size: 24px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }

        .play-audio-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }

        .play-audio-btn:active {
            transform: scale(0.95);
        }

        .options-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .option-btn {
            padding: 30px 20px;
            font-size: 24px;
            border: 3px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            color: #333;
        }

        .option-btn:hover {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea10, #764ba210);
            transform: translateY(-3px);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: white;
            border-color: #38f9d7;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #f5576c, #f093fb);
            color: white;
            border-color: #f5576c;
        }

        .option-btn:disabled,
        .submit-btn:disabled,
        .play-audio-btn:disabled,
        .bottom-btn:disabled,
        .mode-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
            transform: none !important;
            box-shadow: none !important;
        }

        .option-btn:focus-visible,
        .submit-btn:focus-visible,
        .play-audio-btn:focus-visible,
        .bottom-btn:focus-visible,
        .mode-btn:focus-visible,
        .count-btn:focus-visible,
        .word-input:focus-visible,
        .name-input:focus-visible {
            outline: 4px solid #667eea55;
            outline-offset: 3px;
        }

        .input-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .word-input {
            padding: 20px 30px;
            font-size: 28px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            width: 80%;
            max-width: 400px;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            text-align: center;
        }

        .word-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            margin-top: 15px;
            padding: 15px 50px;
            font-size: 22px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }

        .feedback {
            text-align: center;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.correct {
            background: linear-gradient(135deg, #43e97b20, #38f9d720);
            color: #38f9d7;
        }

        .feedback.wrong {
            background: linear-gradient(135deg, #f5576c20, #f093fb20);
            color: #f5576c;
        }

        .bottom-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
        }

        .bottom-btn {
            padding: 20px 40px;
            font-size: 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .bottom-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-next {
            background: linear-gradient(45deg, #43e97b, #38f9d7);
            color: white;
        }

        .btn-menu {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
        }

        .score-display {
            text-align: center;
            font-size: 28px;
            color: #764ba2;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .result-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .history-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .history-title {
            font-size: 36px;
            color: #764ba2;
            margin-bottom: 30px;
        }

        .history-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 30px;
        }

        .history-item {
            background: linear-gradient(135deg, #667eea15, #764ba215);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item-info {
            text-align: left;
        }

        .history-item-mode {
            font-size: 20px;
            color: #764ba2;
            font-weight: bold;
        }

        .history-item-date {
            font-size: 16px;
            color: #888;
        }

        .history-item-score {
            font-size: 28px;
            color: #f5576c;
            font-weight: bold;
        }

        .no-history {
            font-size: 24px;
            color: #888;
            padding: 40px;
        }

        .btn-history {
            background: linear-gradient(45deg, #a8edea, #fed6e3);
            color: #764ba2;
        }

        .result-title {
            font-size: 48px;
            color: #764ba2;
            margin-bottom: 30px;
        }

        .result-score {
            font-size: 72px;
            color: #f5576c;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .result-message {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 40px;
        }

        .stars {
            font-size: 60px;
            margin-bottom: 30px;
        }

        .star {
            display: inline-block;
            margin: 0 10px;
            animation: starPop 0.5s ease-out;
        }

        @keyframes starPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            .options-area {
                grid-template-columns: 1fr;
            }

            .question-text {
                font-size: 28px;
            }

            .option-btn {
                font-size: 20px;
            }

            .game-title {
                font-size: 32px;
            }

            .mode-btn {
                padding: 20px 30px;
                font-size: 20px;
            }
        }

        .login-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .name-input {
            padding: 20px 30px;
            font-size: 28px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            width: 80%;
            max-width: 350px;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            text-align: center;
            display: block;
            margin: 0 auto 20px;
        }

        .name-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .player-info {
            text-align: center;
            margin-bottom: 15px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-name-display {
            font-size: 22px;
            color: #764ba2;
            font-weight: bold;
        }

        .switch-player-btn {
            padding: 8px 20px;
            font-size: 14px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Comic Sans MS', 'Microsoft YaHei', cursive;
            font-weight: bold;
        }

        .btn-resume {
            background: linear-gradient(45deg, #ffd86f, #fc6262);
            color: white;
        }

        .sync-status {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-top: 10px;
        }

        .sync-status.online {
            color: #43e97b;
        }

        .sync-status.offline {
            color: #f5576c;
        }


        .grade-selection { text-align:center; padding:15px; margin-bottom:15px; }
        .grade-selection h3 { font-size:20px; color:#764ba2; margin-bottom:12px; }
        .grade-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; max-width:500px; margin:0 auto 12px; }
        .grade-checkbox { display:flex; align-items:center; justify-content:center; padding:10px 12px; background:linear-gradient(135deg,#667eea15,#764ba215); border-radius:12px; cursor:pointer; transition:all 0.3s; border:2px solid transparent; font-size:15px; color:#333; }
        .grade-checkbox.selected { border-color:#667eea; background:linear-gradient(135deg,#667eea30,#764ba230); font-weight:bold; }
        .grade-checkbox input { margin-right:8px; transform:scale(1.3); }
        .grade-select-all { margin-bottom:8px; }
        .grade-select-all label { font-size:15px; color:#764ba2; cursor:pointer; }
        .question-count-area { text-align:center; margin-bottom:15px; }
        .question-count-area h3 { font-size:17px; color:#764ba2; margin-bottom:8px; }
        .count-options { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; }
        .count-btn { padding:8px 20px; font-size:17px; border:2px solid #e0e0e0; border-radius:15px; background:white; cursor:pointer; transition:all 0.3s; font-family:'Comic Sans MS','Microsoft YaHei',cursive; font-weight:bold; color:#333; }
        .count-btn.selected { border-color:#667eea; background:linear-gradient(45deg,#667eea,#764ba2); color:white; }
        .wrong-notebook-screen { display:none; text-align:center; padding:40px 20px; }
        .wrong-word-item { background:linear-gradient(135deg,#f5576c15,#f093fb15); padding:15px 20px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; text-align:left; }
        .wrong-word-english { font-size:22px; color:#333; font-weight:bold; }
        .wrong-word-chinese { font-size:18px; color:#764ba2; }
        .wrong-word-count { font-size:14px; color:#f5576c; background:#f5576c20; padding:4px 10px; border-radius:10px; }
        .wrong-word-play { padding:8px 15px; font-size:16px; background:linear-gradient(45deg,#667eea,#764ba2); color:white; border:none; border-radius:10px; cursor:pointer; }
        .leaderboard-screen { display:none; text-align:center; padding:40px 20px; }
        .leaderboard-item { background:linear-gradient(135deg,#ffd86f15,#fc626215); padding:15px 20px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
        .leaderboard-rank { font-size:28px; min-width:40px; }
        .leaderboard-name { font-size:20px; color:#333; font-weight:bold; flex:1; text-align:left; margin-left:15px; }
        .leaderboard-score { font-size:24px; color:#f5576c; font-weight:bold; }
        .checkin-area { text-align:center; margin-bottom:12px; padding:10px 20px; background:linear-gradient(135deg,#43e97b15,#38f9d715); border-radius:15px; }
        .checkin-streak { font-size:17px; color:#333; }
        .checkin-streak .streak-num { color:#f5576c; font-weight:bold; font-size:22px; }
        .btn-reverse { background:linear-gradient(45deg,#a18cd1,#fbc2eb); color:white; }
        .btn-wrong-words { background:linear-gradient(45deg,#f5576c,#ff8a5c); color:white; }
        .btn-leaderboard { background:linear-gradient(45deg,#ffd86f,#fc6262); color:white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="rainbow-header">
            <svg class="rainbow-svg" viewBox="0 0 200 120">
                <defs>
                    <linearGradient id="rainbowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" style="stop-color:#ff6b6b"/>
                        <stop offset="20%" style="stop-color:#feca57"/>
                        <stop offset="40%" style="stop-color:#48dbfb"/>
                        <stop offset="60%" style="stop-color:#ff9ff3"/>
                        <stop offset="80%" style="stop-color:#54a0ff"/>
                        <stop offset="100%" style="stop-color:#5f27cd"/>
                    </linearGradient>
                </defs>
                <path d="M 20 100 Q 100 -20 180 100" fill="none" stroke="url(#rainbowGradient)" stroke-width="20" stroke-linecap="round"/>
                <circle cx="180" cy="100" r="15" fill="#feca57"/>
            </svg>
            <h1 class="rainbow-title">小学英语单词闯关游戏</h1>
            <p class="credit">By Rainbow</p>
        </div>


        <div class="login-screen" id="loginScreen">
            <h2 class="game-title"> 欢迎来到英语闯关！</h2>
            <p style="font-size: 20px; color: #764ba2; margin-bottom: 25px;">请输入你的名字</p>
            <input type="text" class="name-input" id="playerNameInput" placeholder="你的名字" maxlength="10">
            <button class="mode-btn btn-listen" onclick="loginPlayer()" style="margin-top: 10px;">
                 开始游戏
            </button>
        </div>

        <div class="menu-screen" id="menuScreen" style="display: none;">

            <div class="player-info" id="playerInfo" style="display: none;">
                <span class="player-name-display" id="playerNameDisplay"> 玩家</span>
                <button class="switch-player-btn" onclick="switchPlayer()">切换玩家</button>
            </div>
            <h2 class="game-title"> 选择游戏模式 </h2>

            <div class="grade-selection" id="gradeSelection">
                <h3> 选择学习范围</h3>
                <div class="grade-select-all"><label><input type="checkbox" id="selectAllGrades" checked onchange="toggleAllGrades(this.checked)"> 全选/取消</label></div>
                <div class="grade-grid">
                    <label class="grade-checkbox selected" id="cb_g3s1"><input type="checkbox" checked onchange="updateGradeSelection()"> 三年级上</label>
                    <label class="grade-checkbox selected" id="cb_g3s2"><input type="checkbox" checked onchange="updateGradeSelection()"> 三年级下</label>
                    <label class="grade-checkbox selected" id="cb_g4s1"><input type="checkbox" checked onchange="updateGradeSelection()"> 四年级上</label>
                    <label class="grade-checkbox selected" id="cb_g4s2"><input type="checkbox" checked onchange="updateGradeSelection()"> 四年级下</label>
                    <label class="grade-checkbox selected" id="cb_g5s1"><input type="checkbox" checked onchange="updateGradeSelection()"> 五年级上</label>
                    <label class="grade-checkbox selected" id="cb_g5s2"><input type="checkbox" checked onchange="updateGradeSelection()"> 五年级下</label>
                    <label class="grade-checkbox selected" id="cb_g6s1"><input type="checkbox" checked onchange="updateGradeSelection()"> 六年级上</label>
                    <label class="grade-checkbox selected" id="cb_g6s2"><input type="checkbox" checked onchange="updateGradeSelection()"> 六年级下</label>
                </div>
            </div>
            <div class="checkin-area" id="checkinArea"><span></span><span class="checkin-streak">连续打卡 <span class="streak-num" id="streakNum">0</span> 天</span><span></span></div>
            <div class="question-count-area">
                <h3> 每轮题目数量</h3>
                <div class="count-options">
                    <button class="count-btn" onclick="setQuestionCount(5)">5题</button>
                    <button class="count-btn" onclick="setQuestionCount(10)">10题</button>
                    <button class="count-btn selected" onclick="setQuestionCount(15)">15题</button>
                    <button class="count-btn" onclick="setQuestionCount(20)">20题</button>
                </div>
            </div>
            <div class="mode-buttons">
                <button class="mode-btn btn-listen" onclick="startGame('listen')">
                     听音选单词
                </button>
                <button class="mode-btn btn-read" onclick="startGame('read')">
                     看单词选中文
                </button>
                <button class="mode-btn btn-write" onclick="startGame('write')">
                     听音写单词
                </button>
                <button class="mode-btn btn-reverse" onclick="startGame('reverse')">
                     看中文选英文
                </button>
                <button class="mode-btn btn-wrong-words" onclick="showWrongNotebook()" id="wrongWordsBtn" style="display:none">
                     错词本 (<span id="wrongWordsCount">0</span>)
                </button>
                <button class="mode-btn btn-history" onclick="showHistory()">
                     查看历史得分
                </button>
                <button class="mode-btn btn-leaderboard" onclick="showLeaderboard()">
                     排行榜
                </button>
                <button class="mode-btn btn-resume" id="resumeBtn" onclick="resumeGame()" style="display: none;">
                     继续上次游戏
                </button>
            </div>
            <div class="sync-status" id="syncStatus">本地存储模式</div>
        </div>

        <div class="game-screen" id="gameScreen">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill">1 / 15</div>
            </div>

            <div class="timer" id="timer">15</div>

            <div class="score-display">
                得分：<span id="scoreDisplay">0</span>
            </div>

            <div class="question-area" id="questionArea">
                <div class="question-text" id="questionText">题目显示区域</div>
                <button class="play-audio-btn" id="playAudioBtn" onclick="playAudio()" style="display: none;">
                    🔊 播放发音
                </button>
            </div>

            <div class="options-area" id="optionsArea">
            </div>

            <div class="input-area" id="inputArea" style="display: none;">
                <input type="text" class="word-input" id="wordInput" placeholder="输入单词" autocomplete="off">
                <button class="submit-btn" id="submitBtn" onclick="submitAnswer()" style="display: none;">
                    提交
                </button>
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="bottom-buttons">
                <button class="bottom-btn btn-next" id="nextBtn" onclick="nextQuestion()" style="display: none;">
                    ➡️ 继续下一题
                </button>
                <button class="bottom-btn btn-menu" onclick="showMenu()">
                    🏠 返回主菜单
                </button>
            </div>
        </div>

        <div class="result-screen" id="resultScreen">
            <h2 class="result-title">🎉 恭喜完成！🎉</h2>
            <div class="result-score" id="finalScore">0</div>
            <div class="stars" id="stars"></div>
            <div class="result-message" id="resultMessage"></div>
            <div class="mode-buttons">
                <button class="mode-btn btn-next" onclick="restartGame()">

        function getRecordTimestamp(record) {

        function formatRecordDate(record) {
            const timestamp = getRecordTimestamp(record);
            return timestamp ? new Date(timestamp).toLocaleString('zh-CN') : (record.date || '');
        }

        function mergeHistory(local, cloud) {
            const all = [...local];
            cloud.forEach(item => {
                const itemTimestamp = getRecordTimestamp(item);
                const exists = all.some(a => {
                    const currentTimestamp = getRecordTimestamp(a);
                    if (itemTimestamp && currentTimestamp) {
                        return currentTimestamp === itemTimestamp;
                    }
                    return a.date === item.date && a.score === item.score && a.mode === item.mode;
                });
                if (!exists) all.push(item);
            });
            all.sort((a, b) => getRecordTimestamp(b) - getRecordTimestamp(a));
            return all.slice(0, 30);
        }

        // Web Audio API 创建音效 - 移动端兼容版
        let audioContext = null;

        function initAudioContext() {
            if (!audioContext) {

        function playSuccessSound() {
            initAudioContext();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1);
            oscillator.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.4);
        }

        function playWrongSound() {

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.setValueAtTime(261.63, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(220.00, audioContext.currentTime + 0.15);
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);

        // 语音合成 - 移动端兼容版
        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const trySpeak = () => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.8;
                    const voices = window.speechSynthesis.getVoices();
                    const englishVoice = voices.find(v => v.lang.startsWith('en'));
                    if (englishVoice) utterance.voice = englishVoice;
                    window.speechSynthesis.speak(utterance);
                };
                if (window.speechSynthesis.getVoices().length === 0) {
                    window.speechSynthesis.addEventListener('voiceschanged', trySpeak, { once: true });
                    setTimeout(trySpeak, 100);
                } else {
                    trySpeak();
                }
                return;
            }
            const audio = new Audio('https://dict.youdao.com/dictvoice?audio=' + encodeURIComponent(text) + '&type=2');
            audio.play().catch(err => console.log('备选音频失败:', err));
        }

        // 合并所有词汇
        function getAllVocabulary() {
            let allWords = [];
            ['grade3','grade4','grade5','grade6'].forEach(gk => {
                ['semester1','semester2'].forEach(sk => {
                    if (selectedGrades[gk+'_'+sk] && vocabularyDatabase[gk] && vocabularyDatabase[gk][sk]) {
                        allWords = allWords.concat(vocabularyDatabase[gk][sk]);
                    }
                });
            });
            if (allWords.length===0) { Object.values(vocabularyDatabase).forEach(g => { Object.values(g).forEach(s => { allWords=allWords.concat(s); }); }); }
            return allWords;
        }
        function shuffleArray(items) {
            const shuffled = [...items];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 随机抽取题目
        function getRandomQuestions(count) {
            return shuffleArray(getAllVocabulary()).slice(0, count);
        }

        // 随机生成干扰项
        function getWrongOptions(correctWord, count, displayField = 'chinese') {
            const usedValues = new Set([correctWord[displayField]]);
            const wrongOptions = [];

            for (const word of shuffleArray(getAllVocabulary())) {
                if (word.word === correctWord.word || word.chinese === correctWord.chinese) {
                    continue;
                }
                if (usedValues.has(word[displayField])) {
                    continue;
                }
                usedValues.add(word[displayField]);
                wrongOptions.push(word);
                if (wrongOptions.length >= count) {
                    break;
                }
            }

            return wrongOptions;
        }

                const correctAnswer = question;
                const wrongOptions = getWrongOptions(question, 3, 'chinese');
                const allOptions = shuffleArray([...wrongOptions, correctAnswer]);
                
                allOptions.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = option.chinese;
                    btn.onclick = () => checkAnswer(option.chinese, correctAnswer.chinese, btn);
                    optionsArea.appendChild(btn);
                });
                
                scheduleQuestionAudio();
                
            } else if (currentMode === 'read') {
                // 看单词选中文模式
                questionText.textContent = question.word;
                
                const correctAnswer = question;
                const wrongOptions = getWrongOptions(question, 3, 'chinese');
                const allOptions = shuffleArray([...wrongOptions, correctAnswer]);
                
                allOptions.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = option.chinese;
                    btn.onclick = () => checkAnswer(option.chinese, correctAnswer.chinese, btn);
                    optionsArea.appendChild(btn);
                });
                
                document.getElementById('submitBtn').style.display = 'none';
                
            } else if (currentMode === 'write') {
                // 听音写单词模式
                questionText.textContent = '点击按钮听发音，输入正确的单词';
                playAudioBtn.style.display = 'block';
                inputArea.style.display = 'block';
                document.getElementById('submitBtn').style.display = 'inline-block';
                document.getElementById('wordInput').focus();
                
                // 绑定回车键
                document.getElementById('wordInput').onkeypress = function(e) {
                    if (e.key === 'Enter' && !isAnswered) {
                        submitAnswer();
                    }
                };
                
                scheduleQuestionAudio();
            } else if (currentMode === 'reverse') {
                questionText.textContent = question.chinese;
                var ca=question;var wo=getWrongOptions(question,3,'word');
                var ao=shuffleArray(wo.concat(ca));
                ao.forEach(function(opt){var btn=document.createElement('button');btn.className='option-btn';btn.textContent=opt.word;btn.onclick=function(){checkAnswer(opt.word,ca.word,btn);};optionsArea.appendChild(btn);});
                document.getElementById('submitBtn').style.display='none';
            }
        }

        // 播放发音
        function playAudio() {
            const question = gameQuestions[currentQuestionIndex];
            if (!question) return;
            speak(question.word);
        }

        // 提交答案（听音写单词模式）
        function submitAnswer() {
            if (isAnswered) return;
            const userAnswer = normalizeAnswer(document.getElementById('wordInput').value);
            const question = gameQuestions[currentQuestionIndex];
            checkAnswer(userAnswer, normalizeAnswer(question.word), null);
        }

        // 检查答案
        function checkAnswer(userAnswer, correctAnswer, button) {
            if (isAnswered) return;
            isAnswered = true;
            
            clearInterval(timerInterval);
            
            const feedback = document.getElementById('feedback');
            feedback.style.display = 'block';
            setAnswerControlsDisabled(true);
            
            const isCorrect = normalizeAnswer(userAnswer) === normalizeAnswer(correctAnswer);
            
            if (isCorrect) {
                score += 10;
                feedback.textContent = praiseWords[Math.floor(Math.random() * praiseWords.length)];
                feedback.classList.add('correct');
                playSuccessSound();
                
                if (button) {
                    button.classList.add('correct');
                }
            } else {
                feedback.textContent = wrongWords[Math.floor(Math.random() * wrongWords.length)];
                feedback.classList.add('wrong');
                playWrongSound();
                
                if (button) {
                    button.classList.add('wrong');
                    // 显示正确答案
                    const allOptions = document.querySelectorAll('.option-btn');
                    allOptions.forEach(btn => {
                        if (btn.textContent === correctAnswer) {
                            btn.classList.add('correct');
                        }
                    });
                }
            }
            
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('nextBtn').style.display = 'block';
            
            // 听音写单词模式下显示正确答案
            const currentWord = gameQuestions[currentQuestionIndex];
            if (currentMode === 'write' && !isCorrect) {
                feedback.textContent = `哎呀，错啦！正确答案是: ${currentWord.word}`;
            }
            // auto-play removed
            if(!isCorrect){saveWrongWord(currentWord);}
            else if(window._isWrongMode){removeWrongWord(currentWord.word);}
        }

        // 下一题
        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex >= getCurrentQuestionCount()) {
                showResult();
            } else {
                displayQuestion();
                saveGameProgress();
            }
        }

        // 显示结果
        function showResult() {
            clearPendingAudio();
            if(window._isWrongMode){totalQuestions=window._origTotal||15;window._isWrongMode=false;}
            recordCheckin();
            // 保存得分到历史记录
            saveScore(currentMode, score);
            
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            
            document.getElementById('finalScore').textContent = `${score} 分`;
            
            const maxScore = getCurrentQuestionCount() * 10;
            const accuracy = maxScore ? score / maxScore : 0;

            // 显示星星
            const starsContainer = document.getElementById('stars');
            starsContainer.innerHTML = '';
            const starCount = Math.ceil(accuracy * 5);
            for (let i = 0; i < starCount && i < 5; i++) {
                const star = document.createElement('span');
                star.className = 'star';
                star.textContent = '⭐';
                star.style.animationDelay = `${i * 0.2}s`;
                starsContainer.appendChild(star);
            }
            
            // 显示评价
            const resultMessage = document.getElementById('resultMessage');
            if (accuracy >= 0.9) {
                resultMessage.textContent = '太棒了！你是英语小天才！🎉';
            } else if (accuracy >= 0.75) {
                resultMessage.textContent = '很不错！继续加油！💪';
            } else if (accuracy >= 0.5) {
                resultMessage.textContent = '还可以哦，多练习会更好！😊';
            } else {
                resultMessage.textContent = '别灰心，再接再厉！💪';
            }
        }

        // 重新开始
        function restartGame() {
            startGame(currentMode);
        }

        // 返回主菜单
        function showMenu() {
            clearInterval(timerInterval);
            clearPendingAudio();
            document.getElementById('menuScreen').style.display = 'block';
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'none';
            if(document.getElementById('wrongNotebookScreen'))document.getElementById('wrongNotebookScreen').style.display='none';
            if(document.getElementById('leaderboardScreen'))document.getElementById('leaderboardScreen').style.display='none';
            updateWrongWordsBtn();loadCheckinData();
        }

        // 计时器
        function resetTimer() {
            clearInterval(timerInterval);
            timer = 15;
            document.getElementById('timer').textContent = timer;
            document.getElementById('timer').classList.remove('warning');
            
            timerInterval = setInterval(() => {
                timer--;
                document.getElementById('timer').textContent = timer;
                
                if (timer <= 5) {
                    document.getElementById('timer').classList.add('warning');
                }
                
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    if (!isAnswered) {
                        isAnswered = true;
                        const feedback = document.getElementById('feedback');
                        feedback.style.display = 'block';
                        setAnswerControlsDisabled(true);
                        feedback.textContent = '时间到！';
                        feedback.classList.add('wrong');
                        playWrongSound();
                        
                        if (currentMode === 'write') {
                            const question = gameQuestions[currentQuestionIndex];
                            feedback.textContent = `时间到！正确答案是: ${question.word}`;
                        }
                        
                        document.getElementById('nextBtn').style.display = 'block';
                        saveWrongWord(gameQuestions[currentQuestionIndex]);
                        
                        // 显示正确答案
                        if (currentMode !== 'write') {
                            const allOptions = document.querySelectorAll('.option-btn');
                            allOptions.forEach(btn => {
                                if (currentMode === 'listen' || currentMode === 'read') {
                                    const correctAnswer = gameQuestions[currentQuestionIndex].chinese;
                                    if (btn.textContent === correctAnswer) {
                                        btn.classList.add('correct');
                                    }
                                } else if (currentMode === 'reverse') {
                                    const correctAnswer = gameQuestions[currentQuestionIndex].word;
                                    if (btn.textContent === correctAnswer) {
                                        btn.classList.add('correct');
                                    }
                                }
                            });
                        }
                    }
                }
            }, 1000);
        }

        function handleGameKeyboardShortcuts(e) {
            var gameScreen = document.getElementById('gameScreen');
            if (!gameScreen || gameScreen.style.display !== 'block') return;

            var activeElement = document.activeElement;
            var isTyping = activeElement && (activeElement.id === 'wordInput' || activeElement.id === 'playerNameInput');
            var nextBtn = document.getElementById('nextBtn');
            var playButtonVisible = document.getElementById('playAudioBtn').style.display !== 'none';

            if ((e.key === ' ' || e.code === 'Space') && playButtonVisible) {
                e.preventDefault();
                playAudio();
                return;
            }

            if (e.key === 'Enter') {
                if (nextBtn.style.display !== 'none') {
                    e.preventDefault();
                    nextQuestion();
                    return;
                }
                if (currentMode === 'write' && !isAnswered) {
                    e.preventDefault();
                    submitAnswer();
                }
                return;
            }

            if (isTyping) return;
            if (isAnswered) return;

            if (/^[1-4]$/.test(e.key)) {
                var options = Array.from(document.querySelectorAll('.option-btn'));
                var index = Number(e.key) - 1;
                if (options[index]) {
                    e.preventDefault();
                    options[index].click();
                }
            }
        }

        document.addEventListener('keydown', handleGameKeyboardShortcuts);

        // 页面加载时恢复音频上下文
        document.addEventListener('click', function() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }, { once: true });

        // 历史记录管理
        function saveScore(mode, score) {
            const history = JSON.parse(localStorage.getItem(getStorageKey('history')) || '[]');
            const timestamp = Date.now();
            const record = {
                mode: mode,
                score: score,
                timestamp: timestamp,
                date: new Date(timestamp).toLocaleString('zh-CN'),
                player: currentPlayerName
            };
            history.unshift(record);
            if (history.length > 30) {
                history.pop();
            }
            localStorage.setItem(getStorageKey('history'), JSON.stringify(history));

            // 同步到 Firebase
            if (isFirebaseReady && firebaseDB) {
                firebaseDB.ref('players/' + currentPlayerName + '/history').set(history)
                    .catch(err => console.log('Firebase保存历史失败:', err));
            }

            // 清除游戏进度
            clearSavedProgress();
        }

        function showHistory() {
            document.getElementById('menuScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('historyScreen').style.display = 'block';

            const history = JSON.parse(localStorage.getItem(getStorageKey('history')) || '[]');
            const historyList = document.getElementById('historyList');

            if (history.length === 0) {
                historyList.innerHTML = '<div class="no-history">暂无游戏记录，快去玩游戏吧！</div>';
                return;
            }

            const modeNames = {
                'listen': '听音选单词',
                'read': '看单词选中文',
                'write': '听音写单词',
                'reverse': '看中文选英语'
            };

            const sortedHistory = [...history].sort((a, b) => getRecordTimestamp(b) - getRecordTimestamp(a));
            historyList.innerHTML = sortedHistory.map((record) => {
                return '<div class="history-item">' +
                    '<div class="history-item-info">' +
                    '<div class="history-item-mode">' + escapeHtml(modeNames[record.mode] || record.mode) + '</div>' +
                    '<div class="history-item-date">' + escapeHtml(formatRecordDate(record)) + '</div>' +
                    '</div>' +
                    '<div class="history-item-score">' + (record.score || 0) + ' 分</div>' +
                    '</div>';
            }).join('');
        }

        function clearHistory() {
            localStorage.removeItem(getStorageKey('history'));
            showHistory();
        }
    </script>
</body>
</html>
